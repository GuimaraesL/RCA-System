name: CI Quality Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-check:
    name: Estático, Lógica e Funcional
    timeout-minutes: 20
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Instalar Dependências (Frontend)
      run: npm install

    - name: Instalar Dependências (Backend)
      run: cd server && npm install

    - name: Verificação de Tipos (TypeScript)
      run: |
        npx tsc --noEmit
        cd server && npx tsc --noEmit

    - name: Executar Auditoria de Internacionalização (i18n)
      run: npx vitest run src/services/__tests__/i18n-audit.test.ts

    - name: Executar Testes de Lógica (Vitest - Frontend)
      run: npx vitest run --exclude "src/services/__tests__/i18n-audit.test.ts"

    - name: Executar Testes de Lógica (Vitest - Backend)
      run: cd server && npm run test

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar Dependências (AI Service)
      run: |
        cd ai_service
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Executar Testes de Lógica (Pytest - AI Service)
      if: env.GOOGLE_API_KEY != ''
      run: |
        cd ai_service
        pytest tests/
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        INTERNAL_AUTH_KEY: ${{ secrets.INTERNAL_AUTH_KEY }}
        BACKEND_URL: http://localhost:3001/api

    - name: Pular Testes de IA (Chave não configurada)
      if: env.GOOGLE_API_KEY == ''
      run: echo "GOOGLE_API_KEY não detectada. Pulando testes do AI Service para evitar falhas de conexão."
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

    - name: Build da Aplicação
      run: npm run build

    - name: Instalar Navegadores Playwright
      run: npx playwright install --with-deps

    - name: Executar Testes Funcionais (Playwright - Mocks)
      run: |
        npx playwright test tests/e2e/modals-ui.spec.ts \
                          tests/e2e/rca-validation-rules.spec.ts \
                          tests/e2e/rca-i18n.spec.ts \
                          tests/e2e/rca-performance-stress.spec.ts
      env:
        CI: true

    - name: Executar Testes de Integração Real (Playwright - Real API)
      run: npx playwright test tests/e2e/rca-workflow-state.spec.ts
      env:
        CI: true

    - name: Upload de Relatórios
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
